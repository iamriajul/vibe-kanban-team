name: Publish NPM Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Existing release tag or ref to publish from (for example v1.2.3-20260408120000)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
  R2_BUCKET: ${{ vars.R2_BUCKET }}
  R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
  VITE_PUBLIC_REACT_VIRTUOSO_LICENSE_KEY: ${{ secrets.VITE_PUBLIC_REACT_VIRTUOSO_LICENSE_KEY }}
  NODE_OPTIONS: --max-old-space-size=6144
  SKIP_SYSTEM_DEPS: "1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.version.outputs.checkout_ref }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine release version and npm tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            raw_ref="${{ inputs.git_ref }}"
          else
            raw_ref="${GITHUB_REF}"
          fi

          ref_name="${raw_ref#refs/tags/}"
          ref_name="${ref_name#refs/heads/}"

          if [[ ! "$ref_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]]; then
            echo "Expected an npm release tag like v1.2.3 or v1.2.3-20260408120000, got: $raw_ref"
            exit 1
          fi

          version="${ref_name#v}"
          npm_tag="latest"

          if [ -z "$version" ]; then
            echo "Release version is empty"
            exit 1
          fi

          echo "checkout_ref=$raw_ref" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"

  build-linux-x64:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      LIBSQLITE3_SYS_USE_PKG_CONFIG: "1"
      NPM_VERSION: ${{ needs.prepare.outputs.version }}
      NPM_TAG: ${{ needs.prepare.outputs.npm_tag }}
      PUBLISH_BINARY_ARTIFACTS: "1"
      PUBLISH_NPM_PACKAGE: "0"
      UPDATE_LATEST_BINARY_POINTER: "0"
      PUBLISH_APPLY_PATCHES: "0"
      PUBLISH_CARGO_PROFILE: dev
      CARGO_INCREMENTAL: "1"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_DEV_SPLIT_DEBUGINFO: "off"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          submodules: recursive

      - name: Apply downstream patches
        shell: bash
        run: ./scripts/apply-patches.sh vibe-kanban

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: vibe-kanban/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: vibe-kanban/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust target cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vibe-kanban/target
          key: npm-linux-x64-target-v3-${{ github.run_id }}
          restore-keys: |
            npm-linux-x64-target-v3-
            npm-linux-x64-target-v2-
            npm-linux-x64-target-v1-

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            git \
            libclang-dev \
            libsqlite3-dev \
            libssl-dev \
            pkg-config \
            python3 \
            unzip \
            zip
          if ! command -v aws >/dev/null 2>&1; then
            case "$(uname -m)" in
              x86_64) awscli_arch="x86_64" ;;
              aarch64|arm64) awscli_arch="aarch64" ;;
              *) echo "Unsupported architecture for AWS CLI: $(uname -m)" && exit 1 ;;
            esac
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${awscli_arch}.zip" -o awscliv2.zip
            unzip -q awscliv2.zip
            sudo ./aws/install --update
          fi
          aws --version

      - name: Upload Linux x64 binaries
        shell: bash
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            x86_64) export OPENSSL_LIB_DIR="/usr/lib/x86_64-linux-gnu" ;;
            aarch64|arm64) export OPENSSL_LIB_DIR="/usr/lib/aarch64-linux-gnu" ;;
            *) echo "Unsupported architecture: $(uname -m)" && exit 1 ;;
          esac

          export OPENSSL_DIR="/usr"
          export OPENSSL_INCLUDE_DIR="/usr/include"
          export PKG_CONFIG_PATH="${OPENSSL_LIB_DIR}/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig"
          export LIBCLANG_PATH="$(dirname "$(find /usr/lib -name 'libclang.so*' -print -quit)")"

          ./scripts/publish-npm.sh

  build-macos-arm64:
    needs: prepare
    runs-on: macos-14
    env:
      MACOS_TARGET: aarch64-apple-darwin
      NPM_VERSION: ${{ needs.prepare.outputs.version }}
      NPM_TAG: ${{ needs.prepare.outputs.npm_tag }}
      PUBLISH_BINARY_ARTIFACTS: "1"
      PUBLISH_NPM_PACKAGE: "0"
      UPDATE_LATEST_BINARY_POINTER: "0"
      PUBLISH_APPLY_PATCHES: "0"
      PUBLISH_CARGO_PROFILE: dev
      CARGO_INCREMENTAL: "1"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_DEV_SPLIT_DEBUGINFO: "off"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          submodules: recursive

      - name: Apply downstream patches
        shell: bash
        run: ./scripts/apply-patches.sh vibe-kanban

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: vibe-kanban/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: vibe-kanban/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust target cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vibe-kanban/target
          key: npm-macos-arm64-target-v3-${{ github.run_id }}
          restore-keys: |
            npm-macos-arm64-target-v3-
            npm-macos-arm64-target-v2-
            npm-macos-arm64-target-v1-

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          for formula in awscli cmake openssl@3 pkg-config; do
            brew list --formula "$formula" >/dev/null 2>&1 || brew install "$formula"
          done
          aws --version

      - name: Upload macOS arm64 binaries
        shell: bash
        run: |
          set -euo pipefail
          openssl_prefix="$(brew --prefix openssl@3)"
          export OPENSSL_DIR="$openssl_prefix"
          export OPENSSL_INCLUDE_DIR="$openssl_prefix/include"
          export OPENSSL_LIB_DIR="$openssl_prefix/lib"
          export PKG_CONFIG_PATH="$openssl_prefix/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          ./scripts/publish-npm.sh

  publish:
    needs:
      - prepare
      - build-linux-x64
      - build-macos-arm64
    runs-on: ubuntu-latest
    env:
      NPM_PUBLISH_AUTH: oidc
      NPM_VERSION: ${{ needs.prepare.outputs.version }}
      NPM_TAG: ${{ needs.prepare.outputs.npm_tag }}
      PUBLISH_BINARY_ARTIFACTS: "0"
      PUBLISH_NPM_PACKAGE: "1"
      UPDATE_LATEST_BINARY_POINTER: "1"
      PUBLISH_APPLY_PATCHES: "0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          submodules: recursive

      - name: Apply downstream patches
        shell: bash
        run: ./scripts/apply-patches.sh vibe-kanban

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: vibe-kanban/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: vibe-kanban/pnpm-lock.yaml

      - name: Update npm for trusted publishing
        shell: bash
        run: npm install -g npm@latest

      - name: Publish package
        shell: bash
        run: ./scripts/publish-npm.sh
