name: Nightly Upstream Release Check

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Release stream to check"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - frontend
          - remote
      dry_run:
        description: "Run without pushing commit/tag"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  nightly:
    name: Nightly check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [frontend, remote]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run nightly release check
        env:
          TARGET: ${{ matrix.target }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          NIGHTLY_RELEASE_PUSH_TOKEN: ${{ secrets.NIGHTLY_RELEASE_PUSH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          UPSTREAM_REPO_API: ${{ vars.UPSTREAM_REPO_API }}
          SELECTED_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '' }}
        run: |
          set -euo pipefail
          if [ "$SELECTED_TARGET" != "all" ] && [ "$SELECTED_TARGET" != "$TARGET" ]; then
            echo "Skipping target '$TARGET' (selected target: '$SELECTED_TARGET')"
            exit 0
          fi
          bash scripts/nightly-check-release.sh "$TARGET"
