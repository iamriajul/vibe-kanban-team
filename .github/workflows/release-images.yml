name: Release Images and Chart

on:
  push:
    tags:
      - "remote-v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version without the remote-v prefix"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_REMOTE_IMAGE_NAME: ${{ vars.DOCKERHUB_REMOTE_IMAGE_NAME }}
      DOCKERHUB_RELAY_IMAGE_NAME: ${{ vars.DOCKERHUB_RELAY_IMAGE_NAME }}
      FEATURES: ${{ vars.FEATURES }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_API_ENDPOINT: ${{ vars.POSTHOG_API_ENDPOINT }}
      VITE_RELAY_API_BASE_URL: ${{ vars.VITE_RELAY_API_BASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.release_version }}"
          else
            version="${GITHUB_REF_NAME#remote-v}"
          fi

          if [ -z "$version" ]; then
            echo "Release version is empty"
            exit 1
          fi

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            stable=true
          else
            stable=false
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "stable=$stable" >> "$GITHUB_OUTPUT"

      - name: Apply downstream patches
        shell: bash
        run: |
          set -euo pipefail
          git submodule update --init vibe-kanban
          bash scripts/apply-patches.sh vibe-kanban

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push remote image
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          STABLE: ${{ steps.version.outputs.stable }}
        run: |
          set -euo pipefail

          ghcr_image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vibe-kanban-remote"
          tags=(--tag "${ghcr_image}:${VERSION}")

          if [ "$STABLE" = "true" ]; then
            tags+=(--tag "${ghcr_image}:latest")
          fi

          if [ -n "${DOCKERHUB_REMOTE_IMAGE_NAME:-}" ]; then
            tags+=(--tag "${DOCKERHUB_REMOTE_IMAGE_NAME}:${VERSION}")
            if [ "$STABLE" = "true" ]; then
              tags+=(--tag "${DOCKERHUB_REMOTE_IMAGE_NAME}:latest")
            fi
          fi

          docker buildx build \
            --push \
            "${tags[@]}" \
            -f vibe-kanban/crates/remote/Dockerfile \
            --build-arg FEATURES="${FEATURES:-}" \
            --build-arg POSTHOG_API_KEY="${POSTHOG_API_KEY:-}" \
            --build-arg POSTHOG_API_ENDPOINT="${POSTHOG_API_ENDPOINT:-}" \
            --build-arg VITE_RELAY_API_BASE_URL="${VITE_RELAY_API_BASE_URL:-}" \
            ./vibe-kanban

      - name: Build and push relay image
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          STABLE: ${{ steps.version.outputs.stable }}
        run: |
          set -euo pipefail

          ghcr_image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vibe-kanban-relay"
          tags=(--tag "${ghcr_image}:${VERSION}")

          if [ "$STABLE" = "true" ]; then
            tags+=(--tag "${ghcr_image}:latest")
          fi

          if [ -n "${DOCKERHUB_RELAY_IMAGE_NAME:-}" ]; then
            tags+=(--tag "${DOCKERHUB_RELAY_IMAGE_NAME}:${VERSION}")
            if [ "$STABLE" = "true" ]; then
              tags+=(--tag "${DOCKERHUB_RELAY_IMAGE_NAME}:latest")
            fi
          fi

          docker buildx build \
            --push \
            "${tags[@]}" \
            -f vibe-kanban/crates/relay-tunnel/Dockerfile \
            ./vibe-kanban

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR for Helm
        shell: bash
        env:
          HELM_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s\n' "$HELM_REGISTRY_PASSWORD" | helm registry login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Package and publish Helm chart
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package helm/vibe-kanban-cloud \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination dist

          helm push "dist/vibe-kanban-cloud-${VERSION}.tgz" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/helm-charts"
