# Image Build Pipeline
# Builds Docker image and pushes to GitLab Registry
# Deployment to MicroK8s is done manually using the Helm chart

# Build Docker image for the Vibe Kanban Remote Server
build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: "1"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Initialize submodules
    - apk add --no-cache git
    - git submodule update --init --recursive
  script:
    # Pull latest for cache
    - docker pull $IMAGE_NAME:latest || true

    # Build with SHA tag
    # Note: We build without private billing features by default
    # To enable billing, add FEATURES=vk-billing and provide SSH key for private repo
    - |
      docker build \
        --cache-from $IMAGE_NAME:latest \
        -f vibe-kanban/crates/remote/Dockerfile \
        --build-arg FEATURES="${FEATURES:-}" \
        --build-arg POSTHOG_API_KEY="${POSTHOG_API_KEY:-}" \
        --build-arg POSTHOG_API_ENDPOINT="${POSTHOG_API_ENDPOINT:-}" \
        -t $IMAGE_NAME:$IMAGE_TAG \
        ./vibe-kanban

    # Tag as latest
    - docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

    # Push both tags
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest

    # Output image info for manual deployment
    - echo "=============================================="
    - echo "Image built and pushed successfully!"
    - echo "=============================================="
    - echo "Image: $IMAGE_NAME:$IMAGE_TAG"
    - echo "Latest: $IMAGE_NAME:latest"
    - echo ""
    - echo "To deploy manually to MicroK8s:"
    - echo "  helm upgrade --install vibe-kanban ./helm/vibe-kanban-cloud \\"
    - echo "    --set image.repository=$IMAGE_NAME \\"
    - echo "    --set image.tag=$IMAGE_TAG \\"
    - echo "    -f values-production.yaml"
    - echo "=============================================="
  tags:
    - docker

# Build Docker image for release tags (vX.Y.Z or X.Y.Z)
build-image-release:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: "1"
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Initialize submodules
    - apk add --no-cache git
    - git submodule update --init --recursive
  script:
    - |
      RELEASE_VERSION="${CI_COMMIT_TAG#v}"
      if [ -z "$RELEASE_VERSION" ]; then
        echo "Release tag is empty; expected vX.Y.Z or X.Y.Z"
        exit 1
      fi

      # Pull latest for cache
      docker pull $IMAGE_NAME:latest || true

      # Build with release tag
      docker build \
        --cache-from $IMAGE_NAME:latest \
        -f vibe-kanban/crates/remote/Dockerfile \
        --build-arg FEATURES="${FEATURES:-}" \
        --build-arg POSTHOG_API_KEY="${POSTHOG_API_KEY:-}" \
        --build-arg POSTHOG_API_ENDPOINT="${POSTHOG_API_ENDPOINT:-}" \
        -t $IMAGE_NAME:$RELEASE_VERSION \
        ./vibe-kanban

      # Push release tag
      docker push $IMAGE_NAME:$RELEASE_VERSION

      echo "Release image pushed: $IMAGE_NAME:$RELEASE_VERSION"
  tags:
    - docker

# Package and publish Helm chart for release tags
release-chart:
  stage: release
  image: alpine:3.20
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: build-image-release
  before_script:
    - apk add --no-cache curl ca-certificates tar gzip
    - HELM_VERSION="3.14.4"
    - curl -sSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tgz
    - tar -xzf /tmp/helm.tgz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/helm
  script:
    - |
      RELEASE_VERSION="${CI_COMMIT_TAG#v}"
      if [ -z "$RELEASE_VERSION" ]; then
        echo "Release tag is empty; expected vX.Y.Z or X.Y.Z"
        exit 1
      fi

      mkdir -p dist
      helm package helm/vibe-kanban-cloud \
        --version "$RELEASE_VERSION" \
        --app-version "$RELEASE_VERSION" \
        --destination dist

      CHART_PACKAGE="dist/vibe-kanban-cloud-${RELEASE_VERSION}.tgz"
      echo "Uploading ${CHART_PACKAGE} to GitLab Helm registry..."
      curl --fail --request POST \
        --user "gitlab-ci-token:${CI_JOB_TOKEN}" \
        --form "chart=@${CHART_PACKAGE}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/stable/charts"
  tags:
    - docker

# Discord notification for image build
notify-discord:
  stage: notify
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
  needs:
    - job: build-image
      optional: true
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      # Skip if Discord webhook not configured
      if [ -z "$DISCORD_WEBHOOK_PRODUCTION" ]; then
        echo "Discord webhook URL not configured, skipping notification"
        exit 0
      fi

      # Determine build status
      if [ "$CI_JOB_STATUS" == "success" ]; then
        STATUS="Success"
        COLOR="5763719"
      else
        STATUS="Failed"
        COLOR="15548997"
      fi

      # Extract commit info
      SHORT_SHA="${CI_COMMIT_SHA:0:7}"

      # Create Discord webhook payload
      PAYLOAD=$(jq -n \
        --arg status "$STATUS" \
        --arg commit "$SHORT_SHA" \
        --arg full_commit "$CI_COMMIT_SHA" \
        --arg actor "$GITLAB_USER_LOGIN" \
        --arg project "$CI_PROJECT_PATH" \
        --arg project_url "$CI_PROJECT_URL" \
        --arg pipeline_url "$CI_PIPELINE_URL" \
        --arg image "$IMAGE_NAME:$CI_COMMIT_SHA" \
        --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
        --argjson color "$COLOR" \
        '{
          "embeds": [{
            "title": ("Vibe Kanban Image Build " + $status),
            "description": "Docker image built and pushed to GitLab Registry",
            "color": $color,
            "fields": [
              {
                "name": "Commit",
                "value": ("[`" + $commit + "`](" + $project_url + "/-/commit/" + $full_commit + ")"),
                "inline": true
              },
              {
                "name": "Triggered by",
                "value": $actor,
                "inline": true
              },
              {
                "name": "Pipeline",
                "value": ("[View Pipeline](" + $pipeline_url + ")"),
                "inline": true
              },
              {
                "name": "Image",
                "value": ("`" + $image + "`"),
                "inline": false
              }
            ],
            "timestamp": $timestamp,
            "footer": {
              "text": "GitLab CI/CD"
            }
          }]
        }')

      # Send notification to Discord with error handling
      echo "Sending Discord notification..."
      if ! curl -X POST \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD" \
        "$DISCORD_WEBHOOK_PRODUCTION" \
        --max-time 30 \
        --retry 3 \
        --retry-delay 5 \
        --silent \
        --show-error; then
        echo "Failed to send Discord notification after retries"
        exit 0  # Don't fail the entire pipeline
      else
        echo "Discord notification sent successfully"
      fi
  allow_failure: true
  tags:
    - docker
