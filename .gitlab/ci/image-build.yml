# Image Build Pipeline
# Builds Docker image and pushes to GitLab Registry
# Deployment to MicroK8s is done manually using the Helm chart
#
# Release tag format: remote-vX.Y.Z or remote-X.Y.Z
# Examples: remote-v0.1.2, remote-v0.1.9-20260210214134, remote-v0.2.0-rc.1
# The "remote-" prefix is stripped for the actual image/chart version

# Build Docker image for the Vibe Kanban Remote Server
# REMOVED: This job previously triggered on main branch pushes
# Now we only build images via tag-based releases (see build-image-release below)

# Build Docker image for remote server release tags (remote-vX.Y.Z or remote-X.Y.Z)
build-image-release:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: "1"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^remote-v?[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$/'
    - when: never
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Initialize vibe-kanban-remote submodule only (for remote server builds)
    - apk add --no-cache git
    - git submodule update --init vibe-kanban-remote
    - scripts/apply-patches.sh vibe-kanban-remote
  script:
    - |
      # Extract version from tag: remote-v0.1.2 -> 0.1.2
      RELEASE_VERSION="${CI_COMMIT_TAG#remote-}"
      RELEASE_VERSION="${RELEASE_VERSION#v}"
      if [ -z "$RELEASE_VERSION" ]; then
        echo "Release tag is empty; expected remote-vX.Y.Z or remote-X.Y.Z"
        exit 1
      fi

      # Pull latest for cache
      docker pull $IMAGE_NAME:latest || true

      # Build and tag both release version and latest (using vibe-kanban-remote submodule)
      docker build \
        --cache-from $IMAGE_NAME:latest \
        -f vibe-kanban-remote/crates/remote/Dockerfile \
        --build-arg FEATURES="${FEATURES:-}" \
        --build-arg POSTHOG_API_KEY="${POSTHOG_API_KEY:-}" \
        --build-arg POSTHOG_API_ENDPOINT="${POSTHOG_API_ENDPOINT:-}" \
        -t $IMAGE_NAME:$RELEASE_VERSION \
        -t $IMAGE_NAME:latest \
        ./vibe-kanban-remote

      # Push both release and latest tags
      docker push $IMAGE_NAME:$RELEASE_VERSION
      docker push $IMAGE_NAME:latest

      echo "Release images pushed: $IMAGE_NAME:$RELEASE_VERSION and $IMAGE_NAME:latest"
  tags:
    - docker

# Package and publish Helm chart for remote server release tags
release-chart:
  stage: release
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_TAG =~ /^remote-v?[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$/'
    - when: never
  needs:
    - job: build-image-release
  before_script:
    - apk add --no-cache curl ca-certificates tar gzip
    - HELM_VERSION="3.14.4"
    - curl -sSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tgz
    - tar -xzf /tmp/helm.tgz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/helm
  script:
    - |
      # Extract version from tag: remote-v0.1.2 -> 0.1.2
      RELEASE_VERSION="${CI_COMMIT_TAG#remote-}"
      RELEASE_VERSION="${RELEASE_VERSION#v}"
      if [ -z "$RELEASE_VERSION" ]; then
        echo "Release tag is empty; expected remote-vX.Y.Z or remote-X.Y.Z"
        exit 1
      fi

      mkdir -p dist
      helm package helm/vibe-kanban-cloud \
        --version "$RELEASE_VERSION" \
        --app-version "$RELEASE_VERSION" \
        --destination dist

      CHART_PACKAGE="dist/vibe-kanban-cloud-${RELEASE_VERSION}.tgz"
      echo "Uploading ${CHART_PACKAGE} to GitLab Helm registry..."
      curl --fail --request POST \
        --user "gitlab-ci-token:${CI_JOB_TOKEN}" \
        --form "chart=@${CHART_PACKAGE}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/stable/charts"
  tags:
    - docker

# Discord notification for remote server image release
notify-discord-release:
  stage: notify
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^remote-v?[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$/'
      when: always
    - when: never
  needs:
    - job: build-image-release
      optional: true
    - job: release-chart
      optional: true
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      # Skip if Discord webhook not configured
      if [ -z "$DISCORD_WEBHOOK_PRODUCTION" ]; then
        echo "Discord webhook URL not configured, skipping notification"
        exit 0
      fi

      # Extract version from tag: remote-v0.1.2 -> 0.1.2
      RELEASE_VERSION="${CI_COMMIT_TAG#remote-}"
      RELEASE_VERSION="${RELEASE_VERSION#v}"

      # Determine build status
      if [ "$CI_JOB_STATUS" == "success" ]; then
        STATUS="Success"
        COLOR="5763719"
      else
        STATUS="Failed"
        COLOR="15548997"
      fi

      # Extract commit info
      SHORT_SHA="${CI_COMMIT_SHA:0:7}"

      # Create Discord webhook payload
      PAYLOAD=$(jq -n \
        --arg status "$STATUS" \
        --arg commit "$SHORT_SHA" \
        --arg full_commit "$CI_COMMIT_SHA" \
        --arg actor "$GITLAB_USER_LOGIN" \
        --arg project "$CI_PROJECT_PATH" \
        --arg project_url "$CI_PROJECT_URL" \
        --arg pipeline_url "$CI_PIPELINE_URL" \
        --arg version "$RELEASE_VERSION" \
        --arg tag "$CI_COMMIT_TAG" \
        --arg image "$IMAGE_NAME:$RELEASE_VERSION" \
        --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
        --argjson color "$COLOR" \
        '{
          "embeds": [{
            "title": ("Vibe Kanban Remote Server Release " + $status),
            "description": ("Version " + $version + " - Docker image and Helm chart"),
            "color": $color,
            "fields": [
              {
                "name": "Version",
                "value": ("`" + $version + "`"),
                "inline": true
              },
              {
                "name": "Tag",
                "value": ("`" + $tag + "`"),
                "inline": true
              },
              {
                "name": "Commit",
                "value": ("[`" + $commit + "`](" + $project_url + "/-/commit/" + $full_commit + ")"),
                "inline": true
              },
              {
                "name": "Triggered by",
                "value": $actor,
                "inline": true
              },
              {
                "name": "Pipeline",
                "value": ("[View Pipeline](" + $pipeline_url + ")"),
                "inline": true
              },
              {
                "name": "Image",
                "value": ("`" + $image + "`"),
                "inline": false
              }
            ],
            "timestamp": $timestamp,
            "footer": {
              "text": "GitLab CI/CD"
            }
          }]
        }')

      # Send notification to Discord with error handling
      echo "Sending Discord notification..."
      if ! curl -X POST \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD" \
        "$DISCORD_WEBHOOK_PRODUCTION" \
        --max-time 30 \
        --retry 3 \
        --retry-delay 5 \
        --silent \
        --show-error; then
        echo "Failed to send Discord notification after retries"
        exit 0  # Don't fail the entire pipeline
      else
        echo "Discord notification sent successfully"
      fi
  allow_failure: true
  tags:
    - docker
