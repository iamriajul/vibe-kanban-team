# Image Build Pipeline
# Builds Docker images and pushes to GitLab Registry and optional Docker Hub repos
# Deployment to MicroK8s is done manually using the Helm chart
#
# Release tag format: remote-vX.Y.Z or remote-X.Y.Z
# Examples: remote-v0.1.2, remote-v0.1.9-20260210214134, remote-v0.2.0-rc.1
# The "remote-" prefix is stripped for the actual image/chart version

# Build Docker images for the Vibe Kanban Remote and Relay Servers
# REMOVED: This job previously triggered on main branch pushes
# Now we only build images via tag-based releases (see build-image-release below)

# Build Docker image for remote server release tags (remote-vX.Y.Z or remote-X.Y.Z)
build-image-release:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
      command: [ "--tls=false" ]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: 1
    DOCKER_HOST: tcp://docker:2375
  rules:
    - if: '$CI_COMMIT_TAG =~ /^remote-v?[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$/'
    - when: never
  before_script:
    # Initialize vibe-kanban-remote submodule only (for remote server builds)
    - apk add --no-cache git
    - git submodule update --init vibe-kanban-remote
    - scripts/apply-patches.sh vibe-kanban-remote
  script:
    - |
      # Extract version from tag: remote-v0.1.2 -> 0.1.2
      RELEASE_VERSION="${CI_COMMIT_TAG#remote-}"
      RELEASE_VERSION="${RELEASE_VERSION#v}"
      if [ -z "$RELEASE_VERSION" ]; then
        echo "Release tag is empty; expected remote-vX.Y.Z or remote-X.Y.Z"
        exit 1
      fi

      GITLAB_PUSH_ENABLED="${PUSH_GITLAB_REGISTRY:-true}"

      if [ "$GITLAB_PUSH_ENABLED" = "true" ] && [ -z "${IMAGE_NAME:-}" ]; then
        echo "PUSH_GITLAB_REGISTRY is true but IMAGE_NAME is empty"
        exit 1
      fi

      if [ "$GITLAB_PUSH_ENABLED" != "true" ] && [ -z "${DOCKER_HUB_REMOTE_IMAGE_NAME:-}" ]; then
        echo "No remote image target configured; set DOCKER_HUB_REMOTE_IMAGE_NAME or enable PUSH_GITLAB_REGISTRY"
        exit 1
      fi

      if [ "$GITLAB_PUSH_ENABLED" = "true" ]; then
        if [ -z "${CI_REGISTRY:-}" ] || [ -z "${CI_REGISTRY_USER:-}" ] || [ -z "${CI_REGISTRY_PASSWORD:-}" ]; then
          echo "GitLab registry push is enabled but credentials are missing"
          exit 1
        fi
        printf '%s\n' "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
      fi

      if [ -n "${DOCKER_HUB_REMOTE_IMAGE_NAME:-}" ]; then
        if [ -z "${DOCKER_HUB_USERNAME:-}" ] || [ -z "${DOCKER_HUB_TOKEN:-}" ]; then
          echo "DOCKER_HUB_REMOTE_IMAGE_NAME is set but DOCKER_HUB_USERNAME or DOCKER_HUB_TOKEN is missing"
          exit 1
        fi
        printf '%s\n' "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
      fi

      CACHE_FROM_IMAGE=""
      if [ "$GITLAB_PUSH_ENABLED" = "true" ]; then
        CACHE_FROM_IMAGE="${IMAGE_NAME}:latest"
      elif [ -n "${DOCKER_HUB_REMOTE_IMAGE_NAME:-}" ]; then
        CACHE_FROM_IMAGE="${DOCKER_HUB_REMOTE_IMAGE_NAME}:latest"
      fi

      if [ -n "$CACHE_FROM_IMAGE" ]; then
        docker pull "$CACHE_FROM_IMAGE" || true
      fi

      BUILD_IMAGE="vibe-kanban-remote-build:${CI_PIPELINE_ID:-local}"
      if [ -n "$CACHE_FROM_IMAGE" ]; then
        docker build \
          --cache-from "$CACHE_FROM_IMAGE" \
          -f vibe-kanban-remote/crates/remote/Dockerfile \
          --build-arg FEATURES="${FEATURES:-}" \
          --build-arg POSTHOG_API_KEY="${POSTHOG_API_KEY:-}" \
          --build-arg POSTHOG_API_ENDPOINT="${POSTHOG_API_ENDPOINT:-}" \
          --build-arg VITE_RELAY_API_BASE_URL="${VITE_RELAY_API_BASE_URL:-}" \
          -t "$BUILD_IMAGE" \
          ./vibe-kanban-remote
      else
        docker build \
          -f vibe-kanban-remote/crates/remote/Dockerfile \
          --build-arg FEATURES="${FEATURES:-}" \
          --build-arg POSTHOG_API_KEY="${POSTHOG_API_KEY:-}" \
          --build-arg POSTHOG_API_ENDPOINT="${POSTHOG_API_ENDPOINT:-}" \
          --build-arg VITE_RELAY_API_BASE_URL="${VITE_RELAY_API_BASE_URL:-}" \
          -t "$BUILD_IMAGE" \
          ./vibe-kanban-remote
      fi

      push_target() {
        target_image="$1"
        docker tag "$BUILD_IMAGE" "${target_image}:${RELEASE_VERSION}"
        docker tag "$BUILD_IMAGE" "${target_image}:latest"
        docker push "${target_image}:${RELEASE_VERSION}"
        docker push "${target_image}:latest"
      }

      if [ "$GITLAB_PUSH_ENABLED" = "true" ]; then
        push_target "$IMAGE_NAME"
      fi
      if [ -n "${DOCKER_HUB_REMOTE_IMAGE_NAME:-}" ]; then
        push_target "$DOCKER_HUB_REMOTE_IMAGE_NAME"
      fi

      echo "Remote release image pushed for version ${RELEASE_VERSION}"
  tags:
    - docker

# Build Docker image for relay server release tags (remote-vX.Y.Z or remote-X.Y.Z)
build-relay-image-release:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
      command: [ "--tls=false" ]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: 1
    DOCKER_HOST: tcp://docker:2375
  rules:
    - if: '$CI_COMMIT_TAG =~ /^remote-v?[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$/'
    - when: never
  before_script:
    # Initialize vibe-kanban-remote submodule only (for relay server builds)
    - apk add --no-cache git
    - git submodule update --init vibe-kanban-remote
    - scripts/apply-patches.sh vibe-kanban-remote
  script:
    - |
      # Extract version from tag: remote-v0.1.2 -> 0.1.2
      RELEASE_VERSION="${CI_COMMIT_TAG#remote-}"
      RELEASE_VERSION="${RELEASE_VERSION#v}"
      if [ -z "$RELEASE_VERSION" ]; then
        echo "Release tag is empty; expected remote-vX.Y.Z or remote-X.Y.Z"
        exit 1
      fi

      GITLAB_PUSH_ENABLED="${PUSH_GITLAB_REGISTRY:-true}"

      if [ "$GITLAB_PUSH_ENABLED" = "true" ] && [ -z "${RELAY_IMAGE_NAME:-}" ]; then
        echo "PUSH_GITLAB_REGISTRY is true but RELAY_IMAGE_NAME is empty"
        exit 1
      fi

      if [ "$GITLAB_PUSH_ENABLED" != "true" ] && [ -z "${DOCKER_HUB_RELAY_IMAGE_NAME:-}" ]; then
        echo "No relay image target configured; set DOCKER_HUB_RELAY_IMAGE_NAME or enable PUSH_GITLAB_REGISTRY"
        exit 1
      fi

      if [ "$GITLAB_PUSH_ENABLED" = "true" ]; then
        if [ -z "${CI_REGISTRY:-}" ] || [ -z "${CI_REGISTRY_USER:-}" ] || [ -z "${CI_REGISTRY_PASSWORD:-}" ]; then
          echo "GitLab registry push is enabled but credentials are missing"
          exit 1
        fi
        printf '%s\n' "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
      fi

      if [ -n "${DOCKER_HUB_RELAY_IMAGE_NAME:-}" ]; then
        if [ -z "${DOCKER_HUB_USERNAME:-}" ] || [ -z "${DOCKER_HUB_TOKEN:-}" ]; then
          echo "DOCKER_HUB_RELAY_IMAGE_NAME is set but DOCKER_HUB_USERNAME or DOCKER_HUB_TOKEN is missing"
          exit 1
        fi
        printf '%s\n' "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
      fi

      CACHE_FROM_IMAGE=""
      if [ "$GITLAB_PUSH_ENABLED" = "true" ]; then
        CACHE_FROM_IMAGE="${RELAY_IMAGE_NAME}:latest"
      elif [ -n "${DOCKER_HUB_RELAY_IMAGE_NAME:-}" ]; then
        CACHE_FROM_IMAGE="${DOCKER_HUB_RELAY_IMAGE_NAME}:latest"
      fi

      if [ -n "$CACHE_FROM_IMAGE" ]; then
        docker pull "$CACHE_FROM_IMAGE" || true
      fi

      BUILD_IMAGE="vibe-kanban-relay-build:${CI_PIPELINE_ID:-local}"
      if [ -n "$CACHE_FROM_IMAGE" ]; then
        docker build \
          --cache-from "$CACHE_FROM_IMAGE" \
          -f vibe-kanban-remote/crates/relay-tunnel/Dockerfile \
          -t "$BUILD_IMAGE" \
          ./vibe-kanban-remote
      else
        docker build \
          -f vibe-kanban-remote/crates/relay-tunnel/Dockerfile \
          -t "$BUILD_IMAGE" \
          ./vibe-kanban-remote
      fi

      push_target() {
        target_image="$1"
        docker tag "$BUILD_IMAGE" "${target_image}:${RELEASE_VERSION}"
        docker tag "$BUILD_IMAGE" "${target_image}:latest"
        docker push "${target_image}:${RELEASE_VERSION}"
        docker push "${target_image}:latest"
      }

      if [ "$GITLAB_PUSH_ENABLED" = "true" ]; then
        push_target "$RELAY_IMAGE_NAME"
      fi
      if [ -n "${DOCKER_HUB_RELAY_IMAGE_NAME:-}" ]; then
        push_target "$DOCKER_HUB_RELAY_IMAGE_NAME"
      fi

      echo "Relay release image pushed for version ${RELEASE_VERSION}"
  tags:
    - docker

# Package and publish Helm chart for remote server release tags
release-chart:
  stage: release
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_TAG =~ /^remote-v?[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$/'
    - when: never
  needs:
    - job: build-image-release
    - job: build-relay-image-release
  before_script:
    - apk add --no-cache curl ca-certificates tar gzip
    - HELM_VERSION="3.14.4"
    - curl -sSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tgz
    - tar -xzf /tmp/helm.tgz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/helm
  script:
    - |
      # Extract version from tag: remote-v0.1.2 -> 0.1.2
      RELEASE_VERSION="${CI_COMMIT_TAG#remote-}"
      RELEASE_VERSION="${RELEASE_VERSION#v}"
      if [ -z "$RELEASE_VERSION" ]; then
        echo "Release tag is empty; expected remote-vX.Y.Z or remote-X.Y.Z"
        exit 1
      fi

      mkdir -p dist
      helm package helm/vibe-kanban-cloud \
        --version "$RELEASE_VERSION" \
        --app-version "$RELEASE_VERSION" \
        --destination dist

      CHART_PACKAGE="dist/vibe-kanban-cloud-${RELEASE_VERSION}.tgz"
      echo "Uploading ${CHART_PACKAGE} to GitLab Helm registry..."
      curl --fail --request POST \
        --user "gitlab-ci-token:${CI_JOB_TOKEN}" \
        --form "chart=@${CHART_PACKAGE}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/stable/charts"
  tags:
    - docker

# Discord notification for remote server image release
notify-discord-release:
  stage: notify
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^remote-v?[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$/'
      when: always
    - when: never
  needs:
    - job: build-image-release
      optional: true
    - job: build-relay-image-release
      optional: true
    - job: release-chart
      optional: true
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      # Skip if Discord webhook not configured
      if [ -z "$DISCORD_WEBHOOK_PRODUCTION" ]; then
        echo "Discord webhook URL not configured, skipping notification"
        exit 0
      fi

      # Extract version from tag: remote-v0.1.2 -> 0.1.2
      RELEASE_VERSION="${CI_COMMIT_TAG#remote-}"
      RELEASE_VERSION="${RELEASE_VERSION#v}"
      GITLAB_PUSH_ENABLED="${PUSH_GITLAB_REGISTRY:-true}"

      REMOTE_IMAGE_OUTPUTS=""
      if [ "$GITLAB_PUSH_ENABLED" = "true" ] && [ -n "${IMAGE_NAME:-}" ]; then
        REMOTE_IMAGE_OUTPUTS="${IMAGE_NAME}:${RELEASE_VERSION}"
      fi
      if [ -n "${DOCKER_HUB_REMOTE_IMAGE_NAME:-}" ]; then
        if [ -n "$REMOTE_IMAGE_OUTPUTS" ]; then
          REMOTE_IMAGE_OUTPUTS="$(printf '%s\n' "$REMOTE_IMAGE_OUTPUTS")"
        fi
        REMOTE_IMAGE_OUTPUTS="${REMOTE_IMAGE_OUTPUTS}${DOCKER_HUB_REMOTE_IMAGE_NAME}:${RELEASE_VERSION}"
      fi

      RELAY_IMAGE_OUTPUTS=""
      if [ "$GITLAB_PUSH_ENABLED" = "true" ] && [ -n "${RELAY_IMAGE_NAME:-}" ]; then
        RELAY_IMAGE_OUTPUTS="${RELAY_IMAGE_NAME}:${RELEASE_VERSION}"
      fi
      if [ -n "${DOCKER_HUB_RELAY_IMAGE_NAME:-}" ]; then
        if [ -n "$RELAY_IMAGE_OUTPUTS" ]; then
          RELAY_IMAGE_OUTPUTS="$(printf '%s\n' "$RELAY_IMAGE_OUTPUTS")"
        fi
        RELAY_IMAGE_OUTPUTS="${RELAY_IMAGE_OUTPUTS}${DOCKER_HUB_RELAY_IMAGE_NAME}:${RELEASE_VERSION}"
      fi

      # Determine build status
      if [ "$CI_JOB_STATUS" == "success" ]; then
        STATUS="Success"
        COLOR="5763719"
      else
        STATUS="Failed"
        COLOR="15548997"
      fi

      # Extract commit info
      SHORT_SHA="${CI_COMMIT_SHA:0:7}"

      # Create Discord webhook payload
      PAYLOAD=$(jq -n \
        --arg status "$STATUS" \
        --arg commit "$SHORT_SHA" \
        --arg full_commit "$CI_COMMIT_SHA" \
        --arg actor "$GITLAB_USER_LOGIN" \
        --arg project "$CI_PROJECT_PATH" \
        --arg project_url "$CI_PROJECT_URL" \
        --arg pipeline_url "$CI_PIPELINE_URL" \
        --arg version "$RELEASE_VERSION" \
        --arg tag "$CI_COMMIT_TAG" \
        --arg remote_image "$REMOTE_IMAGE_OUTPUTS" \
        --arg relay_image "$RELAY_IMAGE_OUTPUTS" \
        --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
        --argjson color "$COLOR" \
        '{
          "embeds": [{
            "title": ("Vibe Kanban Remote + Relay Release " + $status),
            "description": ("Version " + $version + " - Remote + Relay images and Helm chart"),
            "color": $color,
            "fields": [
              {
                "name": "Version",
                "value": ("`" + $version + "`"),
                "inline": true
              },
              {
                "name": "Tag",
                "value": ("`" + $tag + "`"),
                "inline": true
              },
              {
                "name": "Commit",
                "value": ("[`" + $commit + "`](" + $project_url + "/-/commit/" + $full_commit + ")"),
                "inline": true
              },
              {
                "name": "Triggered by",
                "value": $actor,
                "inline": true
              },
              {
                "name": "Pipeline",
                "value": ("[View Pipeline](" + $pipeline_url + ")"),
                "inline": true
              },
              {
                "name": "Remote Image",
                "value": ("`" + $remote_image + "`"),
                "inline": false
              },
              {
                "name": "Relay Image",
                "value": ("`" + $relay_image + "`"),
                "inline": false
              }
            ],
            "timestamp": $timestamp,
            "footer": {
              "text": "GitLab CI/CD"
            }
          }]
        }')

      # Send notification to Discord with error handling
      echo "Sending Discord notification..."
      if ! curl -X POST \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD" \
        "$DISCORD_WEBHOOK_PRODUCTION" \
        --max-time 30 \
        --retry 3 \
        --retry-delay 5 \
        --silent \
        --show-error; then
        echo "Failed to send Discord notification after retries"
        exit 0  # Don't fail the entire pipeline
      else
        echo "Discord notification sent successfully"
      fi
  allow_failure: true
  tags:
    - docker
