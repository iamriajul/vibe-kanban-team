# Scheduled Nightly Release Pipeline
# Checks upstream BloopAI/vibe-kanban for new tags, verifies patches,
# and triggers tag-based releases automatically.
#
# Two jobs run on schedule:
#   1. nightly-frontend - detects new frontend tags (v0.1.XX-TIMESTAMP)
#   2. nightly-remote   - detects new remote tags (remote-v0.1.XX)
#
# Required CI/CD variables:
#   PROJECT_ACCESS_TOKEN       - GitLab token with write_repository scope
#   DISCORD_WEBHOOK_PRODUCTION - Discord webhook for patch-failure alerts

# Frontend release nightly check
nightly-frontend:
  stage: release
  image: alpine:3.20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NIGHTLY_TARGET == "frontend"'
    - when: never
  before_script:
    - apk add --no-cache git curl jq bash coreutils
  script:
    - bash scripts/nightly-check-release.sh frontend
  tags:
    - docker

# Remote release nightly check
nightly-remote:
  stage: release
  image: alpine:3.20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NIGHTLY_TARGET == "remote"'
    - when: never
  before_script:
    - apk add --no-cache git curl jq bash coreutils
  script:
    - bash scripts/nightly-check-release.sh remote
  tags:
    - docker
