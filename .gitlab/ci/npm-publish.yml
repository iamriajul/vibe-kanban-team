# NPM Publish Pipeline
# Publishes the npx CLI package to npm registry
# Runs publish-npm.sh which handles building, uploading binaries to R2, and npm publishing
#
# Supported tag formats:
# - v0.1.2, 0.1.2 (standard semver)
# - v0.1.9-20260210214134 (with timestamp suffix)
# - v0.2.0-rc.1 (release candidate)
# - v0.1.9-alpha.2 (prerelease)
#
# Note: Tags starting with "remote-" are excluded (used for Docker image releases)

# Publish to npm when relevant files change on main branch
publish-npm:
  stage: release
  image: ubuntu:22.04
  needs: []  # Run independently, don't wait for build stage
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        # Submodule pointer change means upstream source changed
        - vibe-kanban
        # Submodule fetch/config changes can affect resolved source
        - .gitmodules
        # Local patch overlay applied before publish
        - patches/**/*
        - scripts/apply-patches.sh
        # Publish script itself
        - scripts/publish-npm.sh
        # NPM CLI package files
        - vibe-kanban/npx-cli/**/*
        # Pipeline config
        - .gitlab/ci/npm-publish.yml
        - .gitlab-ci.yml
    - when: never
  before_script:
    # Install git for submodule operations
    - apt-get update && apt-get install -y git curl
    # Initialize submodules
    - git submodule update --init --recursive
  script:
    # Run the publish script with environment variables from CI/CD settings
    - ./scripts/publish-npm.sh
  variables:
    # Skip system deps installation - rely on script to install what's needed
    SKIP_SYSTEM_DEPS: "0"
  tags:
    - docker
  # Allow manual retry on failure
  retry:
    max: 1
    when:
      - script_failure
  # Don't block pipeline if publish fails (can be manually retried)
  allow_failure: true

# Publish to npm for npm package release tags (vX.Y.Z or X.Y.Z, NOT remote-*)
# Note: Remote server images use remote-vX.Y.Z tags
publish-npm-release:
  stage: release
  image: ubuntu:22.04
  needs: []  # Run independently, don't wait for build stage
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$/ && $CI_COMMIT_TAG !~ /^remote-/'
    - when: never
  before_script:
    # Install git for submodule operations
    - apt-get update && apt-get install -y git curl
    # Initialize submodules
    - git submodule update --init --recursive
  script:
    # Extract version from tag (remove 'v' prefix if present)
    - |
      RELEASE_VERSION="${CI_COMMIT_TAG#v}"
      if [ -z "$RELEASE_VERSION" ]; then
        echo "Release tag is empty; expected vX.Y.Z or X.Y.Z"
        exit 1
      fi
      echo "Publishing npm package version ${RELEASE_VERSION}"
      export NPM_VERSION="${RELEASE_VERSION}"
    # Run the publish script with explicit version
    - ./scripts/publish-npm.sh
  variables:
    SKIP_SYSTEM_DEPS: "0"
  tags:
    - docker
  retry:
    max: 1
    when:
      - script_failure

# Discord notification for npm publish
notify-discord-npm:
  stage: notify
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - vibe-kanban
        - .gitmodules
        - patches/**/*
        - scripts/apply-patches.sh
        - scripts/publish-npm.sh
        - vibe-kanban/npx-cli/**/*
        - .gitlab/ci/npm-publish.yml
        - .gitlab-ci.yml
      when: always
    - when: never
  needs:
    - job: publish-npm
      optional: true
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      # Skip if Discord webhook not configured
      if [ -z "$DISCORD_WEBHOOK_PRODUCTION" ]; then
        echo "Discord webhook URL not configured, skipping notification"
        exit 0
      fi

      # Determine publish status
      if [ "$CI_JOB_STATUS" == "success" ]; then
        STATUS="Success"
        COLOR="5763719"
      else
        STATUS="Failed"
        COLOR="15548997"
      fi

      # Extract commit info
      SHORT_SHA="${CI_COMMIT_SHA:0:7}"

      # Create Discord webhook payload
      PAYLOAD=$(jq -n \
        --arg status "$STATUS" \
        --arg commit "$SHORT_SHA" \
        --arg full_commit "$CI_COMMIT_SHA" \
        --arg actor "$GITLAB_USER_LOGIN" \
        --arg project "$CI_PROJECT_PATH" \
        --arg project_url "$CI_PROJECT_URL" \
        --arg pipeline_url "$CI_PIPELINE_URL" \
        --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
        --argjson color "$COLOR" \
        '{
          "embeds": [{
            "title": ("NPM Package Publish " + $status),
            "description": "NPM package published to npm registry",
            "color": $color,
            "fields": [
              {
                "name": "Commit",
                "value": ("[`" + $commit + "`](" + $project_url + "/-/commit/" + $full_commit + ")"),
                "inline": true
              },
              {
                "name": "Triggered by",
                "value": $actor,
                "inline": true
              },
              {
                "name": "Pipeline",
                "value": ("[View Pipeline](" + $pipeline_url + ")"),
                "inline": true
              },
              {
                "name": "Package",
                "value": "`@iamriajul/vibe-kanban-fork`",
                "inline": false
              }
            ],
            "timestamp": $timestamp,
            "footer": {
              "text": "GitLab CI/CD"
            }
          }]
        }')

      # Send notification to Discord with error handling
      echo "Sending Discord notification..."
      if ! curl -X POST \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD" \
        "$DISCORD_WEBHOOK_PRODUCTION" \
        --max-time 30 \
        --retry 3 \
        --retry-delay 5 \
        --silent \
        --show-error; then
        echo "Failed to send Discord notification after retries"
        exit 0  # Don't fail the entire pipeline
      else
        echo "Discord notification sent successfully"
      fi
  allow_failure: true
  tags:
    - docker
