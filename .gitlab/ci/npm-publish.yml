# NPM Publish Pipeline
# Publishes the npx CLI package to npm registry
# Runs publish-npm.sh which handles building, uploading binaries to R2, and npm publishing
#
# Supported tag formats:
# - v0.1.2, 0.1.2 (standard semver)
# - v0.1.9-20260210214134 (with timestamp suffix)
# - v0.2.0-rc.1 (release candidate)
# - v0.1.9-alpha.2 (prerelease)
#
# Note: Tags starting with "remote-" are excluded (used for Docker image releases)

# Publish to npm when relevant files change on main branch
# REMOVED: This job previously triggered on main branch pushes
# Now we only publish npm packages via tag-based releases (see publish-npm-release below)

# Publish to npm for npm package release tags (vX.Y.Z or X.Y.Z, NOT remote-*)
# Note: Remote server images use remote-vX.Y.Z tags
publish-npm-release:
  stage: release
  image: ubuntu:22.04
  needs: []  # Run independently, don't wait for build stage
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$/ && $CI_COMMIT_TAG !~ /^remote-/'
    - when: never
  before_script:
    # Install Linux build/runtime deps in CI and force modern Node.js
    - |
      apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
        awscli \
        build-essential \
        ca-certificates \
        cmake \
        curl \
        git \
        gnupg \
        clang \
        libclang-dev \
        libsqlite3-dev \
        libssl-dev \
        pkg-config \
        python3 \
        zip
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends nodejs
      node --version
      npm --version
      case "$(uname -m)" in
        x86_64) export OPENSSL_LIB_DIR="/usr/lib/x86_64-linux-gnu" ;;
        aarch64|arm64) export OPENSSL_LIB_DIR="/usr/lib/aarch64-linux-gnu" ;;
        *) echo "Unsupported architecture for OpenSSL path auto-detect: $(uname -m)" && exit 1 ;;
      esac
      export OPENSSL_DIR="/usr"
      export OPENSSL_INCLUDE_DIR="/usr/include"
      export PKG_CONFIG_PATH="${OPENSSL_LIB_DIR}/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig"
      test -f "${OPENSSL_LIB_DIR}/libssl.so"
      LIBCLANG_SO="$(find /usr/lib -name 'libclang.so*' -print -quit 2>/dev/null || true)"
      test -n "${LIBCLANG_SO}"
      export LIBCLANG_PATH="$(dirname "${LIBCLANG_SO}")"
    # Initialize vibe-kanban submodule only (for NPM package builds)
    - git submodule update --init vibe-kanban
    # Apply frontend patches
    - ./scripts/apply-patches.sh vibe-kanban
  script:
    # Extract version from tag (remove 'v' prefix if present)
    - |
      RELEASE_VERSION="${CI_COMMIT_TAG#v}"
      if [ -z "$RELEASE_VERSION" ]; then
        echo "Release tag is empty; expected vX.Y.Z or X.Y.Z"
        exit 1
      fi
      echo "Publishing npm package version ${RELEASE_VERSION}"
      export NPM_VERSION="${RELEASE_VERSION}"
    # Run the publish script with explicit version
    - ./scripts/publish-npm.sh
  variables:
    SKIP_SYSTEM_DEPS: "1"
    LIBSQLITE3_SYS_USE_PKG_CONFIG: "1"
  tags:
    - docker
  retry:
    max: 1
    when:
      - script_failure

# Discord notification for npm package release
notify-discord-npm-release:
  stage: notify
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$/ && $CI_COMMIT_TAG !~ /^remote-/'
      when: always
    - when: never
  needs:
    - job: publish-npm-release
      optional: true
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      # Skip if Discord webhook not configured
      if [ -z "$DISCORD_WEBHOOK_PRODUCTION" ]; then
        echo "Discord webhook URL not configured, skipping notification"
        exit 0
      fi

      # Extract version from tag (remove 'v' prefix if present)
      RELEASE_VERSION="${CI_COMMIT_TAG#v}"

      # Determine publish status
      if [ "$CI_JOB_STATUS" == "success" ]; then
        STATUS="Success"
        COLOR="5763719"
      else
        STATUS="Failed"
        COLOR="15548997"
      fi

      # Extract commit info
      SHORT_SHA="${CI_COMMIT_SHA:0:7}"

      # Create Discord webhook payload
      PAYLOAD=$(jq -n \
        --arg status "$STATUS" \
        --arg commit "$SHORT_SHA" \
        --arg full_commit "$CI_COMMIT_SHA" \
        --arg actor "$GITLAB_USER_LOGIN" \
        --arg project "$CI_PROJECT_PATH" \
        --arg project_url "$CI_PROJECT_URL" \
        --arg pipeline_url "$CI_PIPELINE_URL" \
        --arg version "$RELEASE_VERSION" \
        --arg tag "$CI_COMMIT_TAG" \
        --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
        --argjson color "$COLOR" \
        '{
          "embeds": [{
            "title": ("NPM Package Release " + $status),
            "description": ("Version " + $version + " - Published to npm registry"),
            "color": $color,
            "fields": [
              {
                "name": "Version",
                "value": ("`" + $version + "`"),
                "inline": true
              },
              {
                "name": "Tag",
                "value": ("`" + $tag + "`"),
                "inline": true
              },
              {
                "name": "Commit",
                "value": ("[`" + $commit + "`](" + $project_url + "/-/commit/" + $full_commit + ")"),
                "inline": true
              },
              {
                "name": "Triggered by",
                "value": $actor,
                "inline": true
              },
              {
                "name": "Pipeline",
                "value": ("[View Pipeline](" + $pipeline_url + ")"),
                "inline": true
              },
              {
                "name": "Package",
                "value": "`@iamriajul/vibe-kanban-fork`",
                "inline": false
              }
            ],
            "timestamp": $timestamp,
            "footer": {
              "text": "GitLab CI/CD"
            }
          }]
        }')

      # Send notification to Discord with error handling
      echo "Sending Discord notification..."
      if ! curl -X POST \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD" \
        "$DISCORD_WEBHOOK_PRODUCTION" \
        --max-time 30 \
        --retry 3 \
        --retry-delay 5 \
        --silent \
        --show-error; then
        echo "Failed to send Discord notification after retries"
        exit 0  # Don't fail the entire pipeline
      else
        echo "Discord notification sent successfully"
      fi
  allow_failure: true
  tags:
    - docker
