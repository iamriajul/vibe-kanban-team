{{- if and .Values.frontend.enabled .Values.frontend.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vibe-kanban-cloud.frontend.fullname" . }}-home
  labels:
    {{- include "vibe-kanban-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  accessModes:
    {{- toYaml .Values.frontend.persistence.accessModes | nindent 4 }}
  {{- if .Values.frontend.persistence.storageClass }}
  storageClassName: {{ .Values.frontend.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.frontend.persistence.size }}
{{- end }}
