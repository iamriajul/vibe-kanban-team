{{- if .Values.electric.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibe-kanban-cloud.electric.fullname" . }}
  labels:
    {{- include "vibe-kanban-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: electric
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vibe-kanban-cloud.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: electric
  template:
    metadata:
      labels:
        {{- include "vibe-kanban-cloud.labels" . | nindent 8 }}
        app.kubernetes.io/component: electric
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vibe-kanban-cloud.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      # Wait for Vibe Kanban to run migrations before starting Electric
      initContainers:
        - name: wait-for-app
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Vibe Kanban to initialize database..."
              until wget -q --spider http://{{ include "vibe-kanban-cloud.fullname" . }}:{{ .Values.service.port }}/health 2>/dev/null; do
                echo "Vibe Kanban not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "Vibe Kanban is ready, database migrations complete"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      containers:
        - name: electric
          image: "{{ .Values.electric.image.repository }}:{{ .Values.electric.image.tag }}"
          imagePullPolicy: {{ .Values.electric.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: pg-proxy
              containerPort: 65432
              protocol: TCP
          env:
            - name: PG_PROXY_PORT
              value: "65432"
            - name: LOGICAL_PUBLISHER_HOST
              value: "{{ include "vibe-kanban-cloud.electric.fullname" . }}"
            {{- with .Values.electric.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.electric.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.electric.resources | nindent 12 }}
          volumeMounts:
            - name: electric-data
              mountPath: /app/persistent
      volumes:
        - name: electric-data
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
