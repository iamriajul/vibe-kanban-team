{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vibe-kanban-cloud.frontend.fullname" . }}
  labels:
    {{- include "vibe-kanban-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.app.port }}
      targetPort: frontend
      protocol: TCP
      name: frontend
    - port: {{ .Values.frontend.codeServer.port }}
      targetPort: code-server
      protocol: TCP
      name: code-server
  selector:
    {{- include "vibe-kanban-cloud.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}
