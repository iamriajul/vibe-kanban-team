{{- if and .Values.frontend.enabled .Values.frontend.vpn.enabled }}
# WireGuard VPN secret — contains real credentials.
# Pass values via --set-file, --set, or the values file.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.frontend.vpn.secretName }}
  labels:
    {{- include "vibe-kanban-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  private-key: {{ required "frontend.vpn.privateKey is required when VPN is enabled" .Values.frontend.vpn.privateKey | quote }}
  peer-public-key: {{ required "frontend.vpn.peerPublicKey is required when VPN is enabled" .Values.frontend.vpn.peerPublicKey | quote }}
  endpoint: {{ required "frontend.vpn.endpoint is required when VPN is enabled" .Values.frontend.vpn.endpoint | quote }}
  endpoint-port: {{ .Values.frontend.vpn.endpointPort | default "51820" | quote }}
  address: {{ required "frontend.vpn.address is required when VPN is enabled" .Values.frontend.vpn.address | quote }}
  preshared-key: {{ .Values.frontend.vpn.presharedKey | default "" | quote }}
  dns: {{ .Values.frontend.vpn.dns | default "" | quote }}
{{- end }}
