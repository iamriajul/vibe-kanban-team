{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibe-kanban-cloud.frontend.fullname" . }}
  labels:
    {{- include "vibe-kanban-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vibe-kanban-cloud.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      {{- with .Values.frontend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vibe-kanban-cloud.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      runtimeClassName: {{ .Values.frontend.runtimeClassName }}
      {{- if .Values.frontend.hostUsers | kindIs "bool" }}
      hostUsers: {{ .Values.frontend.hostUsers }}
      {{- end }}
      # Run as root to start systemd (image defaults to USER coder)
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            privileged: false
          command: ["/bin/bash", "/scripts/init.sh"]
          ports:
            - name: frontend
              containerPort: {{ .Values.frontend.app.port }}
              protocol: TCP
            - name: code-server
              containerPort: {{ .Values.frontend.codeServer.port }}
              protocol: TCP
          env:
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vibe-kanban-claude-code
                  key: oauth-token
                  optional: true
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vibe-kanban-zai
                  key: api-key
                  optional: true
            {{- with .Values.frontend.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.frontend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            - name: init-script
              mountPath: /scripts
              readOnly: true
            {{- if .Values.frontend.persistence.enabled }}
            - name: home
              mountPath: /home/coder
            {{- end }}
            - name: docker-data
              mountPath: /var/lib/docker
            {{- if .Values.frontend.vpn.enabled }}
            - name: vpn-config
              mountPath: /etc/wireguard-secret
              readOnly: true
            {{- end }}
      volumes:
        - name: init-script
          configMap:
            name: {{ include "vibe-kanban-cloud.frontend.fullname" . }}-init
            defaultMode: 0755
        {{- if .Values.frontend.persistence.enabled }}
        - name: home
          persistentVolumeClaim:
            claimName: {{ include "vibe-kanban-cloud.frontend.fullname" . }}-home
        {{- end }}
        - name: docker-data
          persistentVolumeClaim:
            claimName: {{ include "vibe-kanban-cloud.frontend.fullname" . }}-docker
        {{- if .Values.frontend.vpn.enabled }}
        - name: vpn-config
          secret:
            secretName: {{ .Values.frontend.vpn.secretName }}
            defaultMode: 0600
        {{- end }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
