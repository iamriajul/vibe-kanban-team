{{- if .Values.electric.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vibe-kanban-cloud.electric.fullname" . }}
  labels:
    {{- include "vibe-kanban-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: electric
spec:
  type: {{ .Values.electric.service.type }}
  ports:
    - port: {{ .Values.electric.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 65432
      targetPort: pg-proxy
      protocol: TCP
      name: pg-proxy
  selector:
    {{- include "vibe-kanban-cloud.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: electric
{{- end }}
