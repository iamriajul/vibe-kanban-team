{{- if .Values.relay.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vibe-kanban-cloud.relay.fullname" . }}
  labels:
    {{- include "vibe-kanban-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: relay
spec:
  type: {{ .Values.relay.service.type }}
  ports:
    - port: {{ .Values.relay.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vibe-kanban-cloud.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: relay
{{- end }}
