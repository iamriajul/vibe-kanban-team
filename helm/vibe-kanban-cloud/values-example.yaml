# Example values for Vibe Kanban Cloud
# This follows the same pattern as the Coder Helm chart

# Image configuration
image:
  repository: registry.example.com/community-infra/vibe-kanban-cloud/vibe-kanban-remote
  tag: ""  # Defaults to chart appVersion; set to a version to pin
  pullPolicy: Always

# Image pull secrets for private registry
imagePullSecrets:
  - name: gitlab-registry-secret

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
  hosts:
    - host: vibe-kanban.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: vibe-kanban-tls
      hosts:
        - vibe-kanban.example.com

# Relay tunnel (optional)
# NOTE: Tunnel users need relay ingress + wildcard TLS.
# NOTE: Build your remote image with VITE_RELAY_API_BASE_URL set to this relay URL.
relay:
  enabled: false

  image:
    repository: registry.example.com/community-infra/vibe-kanban-cloud/vibe-kanban-relay
    tag: ""  # Defaults to chart appVersion; set to a version to pin
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8082

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: relay.vibe-kanban.example.com
        paths:
          - path: /
            pathType: Prefix
      - host: "*.relay.vibe-kanban.example.com"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: relay-vibe-kanban-tls
        hosts:
          - relay.vibe-kanban.example.com
          - "*.relay.vibe-kanban.example.com"

  env:
    - name: SERVER_DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: vibe-kanban-db
          key: url
    - name: VIBEKANBAN_REMOTE_JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: vibe-kanban-secrets
          key: jwt-secret

  extraEnv:
    - name: RUST_LOG
      value: "info"
    - name: RELAY_LISTEN_ADDR
      value: "0.0.0.0:8082"

# Resource limits
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

# =============================================================================
# Environment Variables - Reference your own secrets
# =============================================================================
#
# Prerequisites:
# 1. Create a PostgreSQL database (CloudNativePG, RDS, etc.) with wal_level=logical
# 2. Create the electric_sync role:
#    CREATE ROLE electric_sync WITH LOGIN PASSWORD 'xxx' REPLICATION;
# 3. Create Kubernetes secrets:
#
#    kubectl create secret generic vibe-kanban-db \
#      --from-literal=url='postgres://user:pass@host:5432/remote' \
#      --from-literal=electric-url='postgresql://electric_sync:pass@host:5432/remote?sslmode=disable'
#
#    kubectl create secret generic vibe-kanban-secrets \
#      --from-literal=jwt-secret='your-32-byte-jwt-secret' \
#      --from-literal=electric-role-password='electric-sync-password'
#
#    kubectl create secret generic vibe-kanban-oauth \
#      --from-literal=github-client-id='your-github-client-id' \
#      --from-literal=github-client-secret='your-github-client-secret'
#
# =============================================================================

env:
  # Database connection
  - name: SERVER_DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: vibe-kanban-db
        key: url

  # JWT secret
  - name: VIBEKANBAN_REMOTE_JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: vibe-kanban-secrets
        key: jwt-secret

  # ElectricSQL role password
  - name: ELECTRIC_ROLE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: vibe-kanban-secrets
        key: electric-role-password

  # GitHub OAuth
  - name: GITHUB_OAUTH_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: vibe-kanban-oauth
        key: github-client-id
  - name: GITHUB_OAUTH_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: vibe-kanban-oauth
        key: github-client-secret

  # Optional: Google OAuth (uncomment if using)
  # - name: GOOGLE_OAUTH_CLIENT_ID
  #   valueFrom:
  #     secretKeyRef:
  #       name: vibe-kanban-oauth
  #       key: google-client-id
  # - name: GOOGLE_OAUTH_CLIENT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: vibe-kanban-oauth
  #       key: google-client-secret

# Non-secret environment variables
extraEnv:
  - name: RUST_LOG
    value: "info"
  - name: SERVER_LISTEN_ADDR
    value: "0.0.0.0:8081"
  # Optional: Public URL (for OAuth callbacks)
  # - name: SERVER_PUBLIC_BASE_URL
  #   value: "https://vibe-kanban.example.com"

# =============================================================================
# ElectricSQL Configuration
# =============================================================================

electric:
  enabled: true

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

  # ElectricSQL database connection
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: vibe-kanban-db
          key: electric-url

  extraEnv:
    - name: AUTH_MODE
      value: "insecure"
    - name: ELECTRIC_INSECURE
      value: "true"
    - name: ELECTRIC_MANUAL_TABLE_PUBLISHING
      value: "true"
    - name: ELECTRIC_USAGE_REPORTING
      value: "false"
    - name: ELECTRIC_FEATURE_FLAGS
      value: "allow_subqueries,tagged_subqueries"
