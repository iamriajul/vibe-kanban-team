# Example values for Vibe Kanban Team
# This follows the same pattern as the Coder Helm chart

global:
  # Use the exact frontend hostname users should open. Other services derive
  # below it, such as remote.vk.community.example.com and code.vk.community.example.com.
  domain: "vk.community.example.com"
  ingressClassName: "nginx"
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      # proxy-read-timeout and proxy-send-timeout are injected automatically for nginx
  tls:
    enabled: true
    clusterIssuer: "letsencrypt-prod"

# Image configuration
image:
  repository: ghcr.io/iamriajul/vibe-kanban-team-remote
  tag: ""  # Defaults to chart appVersion; set to a version to pin
  pullPolicy: Always

# Image pull secrets for private registry
imagePullSecrets:
  - name: registry-credentials

# Shared secret references for the common install path.
config:
  existingSecrets:
    database:
      name: vibe-kanban-db
    app:
      name: vibe-kanban-secrets
    oauth:
      name: vibe-kanban-oauth

# Relay tunnel (optional)
# NOTE: Tunnel users need relay ingress. Relay uses path-based routing on one host.
# NOTE: relay.proxyUnderRemoteIngress keeps remote image reusable without
#       requiring VITE_RELAY_API_BASE_URL at build time.
relay:
  enabled: false

  image:
    repository: ghcr.io/iamriajul/vibe-kanban-team-relay
    tag: ""  # Defaults to chart appVersion; set to a version to pin
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8082

  # Proxy relay paths under the main remote ingress host so the frontend can
  # use remote API base URL at runtime.
  proxyUnderRemoteIngress:
    enabled: true
    paths:
      - path: /v1/relay
        pathType: Prefix
      - path: /relay/h
        pathType: Prefix

  extraEnv:
    - name: RUST_LOG
      value: "info"
    - name: RELAY_LISTEN_ADDR
      value: "0.0.0.0:8082"

# Resource limits
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

# =============================================================================
# Environment Variables - Reference your own secrets
# =============================================================================
#
# Prerequisites:
# 1. Create a PostgreSQL database (CloudNativePG, RDS, etc.) with wal_level=logical
# 2. Create the electric_sync role:
#    CREATE ROLE electric_sync WITH LOGIN PASSWORD 'xxx' REPLICATION;
# 3. Create Kubernetes secrets:
#
#    kubectl create secret generic vibe-kanban-db \
#      --from-literal=url='postgres://user:pass@host:5432/remote' \
#      --from-literal=electric-url='postgresql://electric_sync:pass@host:5432/remote?sslmode=disable'
#
#    kubectl create secret generic vibe-kanban-secrets \
#      --from-literal=jwt-secret='your-32-byte-jwt-secret' \
#      --from-literal=electric-role-password='electric-sync-password'
#
#    kubectl create secret generic vibe-kanban-oauth \
#      --from-literal=github-client-id='your-github-client-id' \
#      --from-literal=github-client-secret='your-github-client-secret'
#
# =============================================================================

# Non-secret environment variables
extraEnv:
  - name: RUST_LOG
    value: "info"
  - name: SERVER_LISTEN_ADDR
    value: "0.0.0.0:8081"
  # Optional: Public URL (for OAuth callbacks)
  # - name: SERVER_PUBLIC_BASE_URL
  #   value: "https://vibe-kanban.example.com"

# =============================================================================
# Frontend Configuration (sysbox + code-server)
# =============================================================================
# Requires: sysbox-runc RuntimeClass and wildcard DNS/TLS for code-server proxy.
#
# Architecture:
#   - systemd as PID 1 inside sysbox container
#   - code-server on port 8080 (editor UI + port proxy)
#   - Vibe Kanban frontend on port 3000
#   - --proxy-domain on code-server enables port proxying:
#     any app on localhost:<port> is accessible at
#     https://<port>-code.vk.community.example.com
#
# DNS requirements:
#   - vk.community.example.com  -> frontend app
#   - *.vk.community.example.com -> remote, relay, code-server, and port proxy hosts

frontend:
  enabled: false

  image:
    repository: iamriajul/coder-sysbox-systemd-docker-universal
    tag: "13"
    pullPolicy: IfNotPresent

  runtimeClassName: sysbox-runc

  codeServer:
    port: 13337

  app:
    port: 13500
    command: "npx --yes vibe-kanban-team"
    workingDirectory: "/home/coder"

  service:
    type: ClusterIP

  codeServerIngress:
    annotations:
      # WebSocket support for code-server
      nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
      nginx.ingress.kubernetes.io/configuration-snippet: |
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

  # code-server runs with --auth none. If codeServerIngress.enabled=true, also
  # enable this auth block or explicitly set codeServerIngress.allowUnauthenticated=true.
  auth:
    enabled: false
    emailDomain: "community.example.com"
    secretName: "vibe-kanban-code-server-oauth"

  persistence:
    enabled: true
    storageClass: ""
    size: 20Gi
    accessModes:
      - ReadWriteOnce

  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 1000m
      memory: 2Gi

# =============================================================================
# ElectricSQL Configuration
# =============================================================================

electric:
  enabled: true

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

  extraEnv:
    - name: AUTH_MODE
      value: "insecure"
    - name: ELECTRIC_INSECURE
      value: "true"
    - name: ELECTRIC_MANUAL_TABLE_PUBLISHING
      value: "true"
    - name: ELECTRIC_USAGE_REPORTING
      value: "false"
    - name: ELECTRIC_FEATURE_FLAGS
      value: "allow_subqueries,tagged_subqueries"
