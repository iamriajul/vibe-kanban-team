{{- if include "vibe-kanban-team.frontend.ingressEnabled" . -}}
{{- $frontendName := include "vibe-kanban-team.frontend.fullname" . -}}
{{- $frontendPort := .Values.frontend.app.port -}}
{{- $ingressClassName := .Values.global.ingressClassName | default "" -}}
{{- $useTraefikProxy := and .Values.frontend.auth.enabled (contains "traefik" $ingressClassName) -}}
{{- $backendName := ternary (printf "%s-oauth2-proxy" $frontendName) $frontendName $useTraefikProxy -}}
{{- $backendPort := ternary 4180 ($frontendPort | int) $useTraefikProxy -}}
{{- $annotations := include "vibe-kanban-team.ingress.annotations" (dict "root" . "annotations" .Values.frontend.ingress.annotations) -}}
{{- $authAnnotations := include "vibe-kanban-team.frontend.authAnnotations" . -}}
{{- $className := include "vibe-kanban-team.ingress.className" (dict "root" . "className" .Values.frontend.ingress.className) -}}
{{- $derivedHost := include "vibe-kanban-team.frontend.host" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $frontendName }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- if or (ne (trim $annotations) "") (and .Values.frontend.auth.enabled (not $useTraefikProxy) (ne (trim $authAnnotations) "")) }}
  annotations:
    {{- if ne (trim $annotations) "" }}
    {{- $annotations | nindent 4 }}
    {{- end }}
    {{- if and .Values.frontend.auth.enabled (not $useTraefikProxy) (ne (trim $authAnnotations) "") }}
    {{- $authAnnotations | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if or .Values.frontend.ingress.tls (and (or .Values.global.tls.enabled (ne (.Values.global.tls.clusterIssuer | default "") "")) $derivedHost) }}
  tls:
    {{- if .Values.frontend.ingress.tls }}
    {{- range .Values.frontend.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
      {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
    {{- else }}
    - hosts:
        - {{ $derivedHost | quote }}
      secretName: {{ printf "%sfrontend-tls" (.Values.global.tls.secretNamePrefix | default "") }}
    {{- end }}
  {{- end }}
  rules:
    {{- if and .Values.frontend.ingress.enabled .Values.frontend.ingress.hosts }}
    {{- range .Values.frontend.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $backendName }}
                port:
                  number: {{ $backendPort }}
          {{- end }}
    {{- end }}
    {{- else if $derivedHost }}
    - host: {{ $derivedHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $backendName }}
                port:
                  number: {{ $backendPort }}
    {{- end }}
{{- end }}
