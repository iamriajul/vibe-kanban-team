{{- if and .Values.frontend.enabled .Values.frontend.auth.enabled (gt (len .Values.frontend.auth.allowedEmails) 0) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vibe-kanban-team.frontend.fullname" . }}-oauth2-proxy-emails
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
data:
  emails: |
    {{- range .Values.frontend.auth.allowedEmails }}
    {{ . }}
    {{- end }}
{{- end }}
