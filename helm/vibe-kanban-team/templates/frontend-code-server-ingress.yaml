{{- if include "vibe-kanban-team.frontend.codeServerIngressEnabled" . -}}
{{- $frontendName := include "vibe-kanban-team.frontend.fullname" . -}}
{{- $codeServerPort := .Values.frontend.codeServer.port -}}
{{- $annotations := include "vibe-kanban-team.ingress.annotations" (dict "root" . "annotations" .Values.frontend.codeServerIngress.annotations) -}}
{{- $className := include "vibe-kanban-team.ingress.className" (dict "root" . "className" .Values.frontend.codeServerIngress.className) -}}
{{- $derivedHost := include "vibe-kanban-team.codeServer.host" . -}}
{{- $derivedProxyHost := include "vibe-kanban-team.codeServer.proxyHost" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $frontendName }}-code-server
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- if or (ne (trim $annotations) "") (and .Values.frontend.auth.enabled .Values.frontend.auth.protectedIngressAnnotations) }}
  annotations:
    {{- if ne (trim $annotations) "" }}
    {{- $annotations | nindent 4 }}
    {{- end }}
    {{- if and .Values.frontend.auth.enabled .Values.frontend.auth.protectedIngressAnnotations }}
    {{- toYaml .Values.frontend.auth.protectedIngressAnnotations | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if or .Values.frontend.codeServerIngress.tls (and .Values.global.tls.enabled $derivedHost) }}
  tls:
    {{- if .Values.frontend.codeServerIngress.tls }}
    {{- range .Values.frontend.codeServerIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
      {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
    {{- else }}
    - hosts:
        - {{ $derivedHost | quote }}
        - {{ $derivedProxyHost | quote }}
      secretName: {{ printf "%scode-server-tls" (.Values.global.tls.secretNamePrefix | default "") }}
    {{- end }}
  {{- end }}
  rules:
    {{- if and .Values.frontend.codeServerIngress.enabled .Values.frontend.codeServerIngress.hosts }}
    {{- range .Values.frontend.codeServerIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $frontendName }}
                port:
                  number: {{ $codeServerPort }}
          {{- end }}
    {{- end }}
    {{- else if $derivedHost }}
    - host: {{ $derivedHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $frontendName }}
                port:
                  number: {{ $codeServerPort }}
    - host: {{ $derivedProxyHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $frontendName }}
                port:
                  number: {{ $codeServerPort }}
    {{- end }}
{{- end }}
