{{- if and .Values.frontend.enabled .Values.frontend.codeServerIngress.enabled -}}
{{- $frontendName := include "vibe-kanban-team.frontend.fullname" . -}}
{{- $codeServerPort := .Values.frontend.codeServer.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $frontendName }}-code-server
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    {{- with .Values.frontend.codeServerIngress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and .Values.frontend.auth.enabled .Values.frontend.auth.protectedIngressAnnotations }}
    {{- toYaml .Values.frontend.auth.protectedIngressAnnotations | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.frontend.codeServerIngress.className }}
  ingressClassName: {{ .Values.frontend.codeServerIngress.className }}
  {{- end }}
  {{- if .Values.frontend.codeServerIngress.tls }}
  tls:
    {{- range .Values.frontend.codeServerIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.frontend.codeServerIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $frontendName }}
                port:
                  number: {{ $codeServerPort }}
          {{- end }}
    {{- end }}
{{- end }}
