{{- if include "vibe-kanban-team.remote.ingressEnabled" . -}}
{{- $fullName := include "vibe-kanban-team.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $relayName := include "vibe-kanban-team.relay.fullname" . -}}
{{- $relaySvcPort := .Values.relay.service.port -}}
{{- $proxyRelayViaRemote := and .Values.relay.enabled .Values.relay.proxyUnderRemoteIngress.enabled -}}
{{- $annotations := include "vibe-kanban-team.ingress.annotations" (dict "root" . "annotations" .Values.ingress.annotations) -}}
{{- $className := include "vibe-kanban-team.ingress.className" (dict "root" . "className" .Values.ingress.className) -}}
{{- $derivedHost := include "vibe-kanban-team.remote.host" . -}}
{{- $domain := .Values.global.domain | default "" -}}
{{- $tlsEnabled := or .Values.ingress.tls (and (or .Values.global.tls.enabled (ne (.Values.global.tls.clusterIssuer | default "") "")) $derivedHost) -}}
{{- $remoteAlias := "" -}}
{{- if and $domain (not .Values.frontend.enabled) -}}
{{- $remoteAlias = printf "remote.%s" $domain -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
  {{- if ne (trim $annotations) "" }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if $tlsEnabled }}
  tls:
    {{- if .Values.ingress.tls }}
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
      {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
    {{- else }}
    - hosts:
        - {{ $derivedHost | quote }}
        {{- if $remoteAlias }}
        - {{ $remoteAlias | quote }}
        {{- end }}
      secretName: {{ printf "%sremote-tls" (.Values.global.tls.secretNamePrefix | default "") }}
    {{- end }}
  {{- end }}
  rules:
    {{- if and .Values.ingress.enabled .Values.ingress.hosts }}
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- if $proxyRelayViaRemote }}
          {{- range $.Values.relay.proxyUnderRemoteIngress.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $relayName }}
                port:
                  number: {{ $relaySvcPort }}
          {{- end }}
          {{- end }}
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
    {{- else if $derivedHost }}
    - host: {{ $derivedHost | quote }}
      http:
        paths:
          {{- if $proxyRelayViaRemote }}
          {{- range $.Values.relay.proxyUnderRemoteIngress.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $relayName }}
                port:
                  number: {{ $relaySvcPort }}
          {{- end }}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
    {{- if $remoteAlias }}
    - host: {{ $remoteAlias | quote }}
      http:
        paths:
          {{- if $proxyRelayViaRemote }}
          {{- range $.Values.relay.proxyUnderRemoteIngress.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $relayName }}
                port:
                  number: {{ $relaySvcPort }}
          {{- end }}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
    {{- end }}
    {{- end }}
{{- end }}
