{{- if .Values.ingress.enabled -}}
{{- $fullName := include "vibe-kanban-team.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $relayName := include "vibe-kanban-team.relay.fullname" . -}}
{{- $relaySvcPort := .Values.relay.service.port -}}
{{- $proxyRelayViaRemote := and .Values.relay.enabled .Values.relay.proxyUnderRemoteIngress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- if $proxyRelayViaRemote }}
          {{- range $.Values.relay.proxyUnderRemoteIngress.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $relayName }}
                port:
                  number: {{ $relaySvcPort }}
          {{- end }}
          {{- end }}
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
