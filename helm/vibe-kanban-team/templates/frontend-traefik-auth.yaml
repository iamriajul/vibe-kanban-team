{{- if and .Values.frontend.enabled .Values.frontend.auth.enabled (or .Values.frontend.auth.createTraefikMiddleware (contains "traefik" (.Values.global.ingressClassName | default ""))) }}
{{- $proxyName := printf "%s-oauth2-proxy" (include "vibe-kanban-team.frontend.fullname" .) -}}
# Traefik ForwardAuth middleware — used by code-server ingress.
# The frontend ingress routes through oauth2-proxy directly when using Traefik.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $proxyName }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  forwardAuth:
    address: "http://{{ $proxyName }}.{{ .Release.Namespace }}.svc.cluster.local:4180/oauth2/auth"
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - Authorization
{{- end }}
