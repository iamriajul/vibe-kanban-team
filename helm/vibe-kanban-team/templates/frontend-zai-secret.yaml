{{- if .Values.frontend.enabled }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace "vibe-kanban-zai") }}
{{- if or (not $existing) (ne (default "" .Values.frontend.zai.apiKey) "") }}
# ZAI API key secret for OpenCode authentication.
# Only created if it doesn't already exist, OR if a key is explicitly provided.
# Edit via Lens to update the key, then restart the frontend deployment.
apiVersion: v1
kind: Secret
metadata:
  name: vibe-kanban-zai
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  api-key: {{ .Values.frontend.zai.apiKey | default "" | quote }}
{{- end }}
{{- end }}
