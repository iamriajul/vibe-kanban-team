{{- if .Values.postgres.enabled }}
{{- $pgCluster := include "vibe-kanban-team.postgres.clusterName" . }}
{{- $genSecret := include "vibe-kanban-team.generatedSecretName" . }}
{{- $syncSecret := include "vibe-kanban-team.electricSyncSecretName" . }}
{{- $database := .Values.postgres.database | default "vibe_kanban" }}

{{- /* Stable random values: reuse from existing secrets on upgrade, generate once on install.
       lookup returns nil during `helm template`; new values are generated each dry-run but
       are stable during actual helm install/upgrade against a live cluster. */ -}}
{{- $existingGen := lookup "v1" "Secret" .Release.Namespace $genSecret }}
{{- $existingSync := lookup "v1" "Secret" .Release.Namespace $syncSecret }}

{{- $jwtSecret := "" }}
{{- if and $existingGen (index $existingGen.data "jwt-secret") }}
{{- $jwtSecret = index $existingGen.data "jwt-secret" | b64dec }}
{{- else }}
{{- $jwtSecret = randAlphaNum 32 }}
{{- end }}

{{- $electricSyncPassword := "" }}
{{- if and $existingSync (index $existingSync.data "password") }}
{{- $electricSyncPassword = index $existingSync.data "password" | b64dec }}
{{- else }}
{{- $electricSyncPassword = randAlphaNum 24 }}
{{- end }}

{{- $electricUrl := printf "postgresql://electric_sync:%s@%s-rw:5432/%s?sslmode=disable" $electricSyncPassword $pgCluster $database }}
---
# Generated secret: JWT key, Electric sync password, and pre-assembled Electric DATABASE_URL.
# helm.sh/resource-policy: keep prevents accidental deletion on helm uninstall.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $genSecret }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  jwt-secret: {{ $jwtSecret | quote }}
  electric-sync-password: {{ $electricSyncPassword | quote }}
  electric-url: {{ $electricUrl | quote }}
---
# Electric sync role secret: consumed by CNPG managed.roles to set the electric_sync password.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $syncSecret }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ $electricSyncPassword | quote }}
{{- end }}
