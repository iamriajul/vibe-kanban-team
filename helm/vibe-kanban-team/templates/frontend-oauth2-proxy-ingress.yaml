{{- if include "vibe-kanban-team.frontend.authIngressEnabled" . }}
{{- $proxyName := printf "%s-oauth2-proxy" (include "vibe-kanban-team.frontend.fullname" .) -}}
{{- $annotations := include "vibe-kanban-team.ingress.annotations" (dict "root" . "annotations" .Values.frontend.auth.ingress.annotations) -}}
{{- $className := include "vibe-kanban-team.ingress.className" (dict "root" . "className" .Values.frontend.auth.ingress.className) -}}
{{- $derivedHost := .Values.frontend.auth.host | default (include "vibe-kanban-team.auth.host" .) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $proxyName }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
  {{- if ne (trim $annotations) "" }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if or .Values.frontend.auth.ingress.tls (and .Values.global.tls.enabled $derivedHost) }}
  tls:
    {{- if .Values.frontend.auth.ingress.tls }}
    {{- range .Values.frontend.auth.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
      {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
    {{- else }}
    - hosts:
        - {{ $derivedHost | quote }}
      secretName: {{ printf "%sauth-tls" (.Values.global.tls.secretNamePrefix | default "") }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ $derivedHost | quote }}
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ $proxyName }}
                port:
                  number: 4180
{{- end }}
