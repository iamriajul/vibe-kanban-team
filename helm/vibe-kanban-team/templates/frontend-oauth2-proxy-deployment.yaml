{{- if and .Values.frontend.enabled .Values.frontend.auth.enabled }}
{{- if eq (.Values.frontend.auth.secretName | default "") "" -}}
{{- fail "frontend.auth.enabled=true requires frontend.auth.secretName with client-id, client-secret, and cookie-secret keys." -}}
{{- end -}}
{{- $hasRestriction := or (gt (len .Values.frontend.auth.emailDomains) 0) (gt (len .Values.frontend.auth.allowedEmails) 0) (ne (.Values.frontend.auth.githubOrg | default "") "") (ne (.Values.frontend.auth.githubTeam | default "") "") -}}
{{- if not $hasRestriction -}}
{{- fail "frontend.auth.enabled=true requires at least one access restriction: emailDomains, allowedEmails, githubOrg, or githubTeam." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibe-kanban-team.frontend.fullname" . }}-oauth2-proxy
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vibe-kanban-team.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: oauth2-proxy
  template:
    metadata:
      labels:
        {{- include "vibe-kanban-team.labels" . | nindent 8 }}
        app.kubernetes.io/component: oauth2-proxy
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: oauth2-proxy
          image: "{{ .Values.frontend.auth.image.repository }}:{{ .Values.frontend.auth.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.auth.image.pullPolicy }}
          args:
            - --provider={{ .Values.frontend.auth.provider | default "google" }}
            {{- if .Values.frontend.auth.oidcIssuerUrl }}
            - --oidc-issuer-url={{ .Values.frontend.auth.oidcIssuerUrl }}
            {{- end }}
            {{- range .Values.frontend.auth.emailDomains }}
            - --email-domain={{ . }}
            {{- end }}
            {{- if gt (len .Values.frontend.auth.allowedEmails) 0 }}
            - --authenticated-emails-file=/etc/oauth2-proxy/emails
            {{- end }}
            {{- if .Values.frontend.auth.githubOrg }}
            - --github-org={{ .Values.frontend.auth.githubOrg }}
            {{- end }}
            {{- if .Values.frontend.auth.githubTeam }}
            - --github-team={{ .Values.frontend.auth.githubTeam }}
            {{- end }}
            {{- range .Values.frontend.auth.extraArgs }}
            - {{ . }}
            {{- end }}
            {{- $ingressClassName := .Values.global.ingressClassName | default "" }}
            {{- if contains "traefik" $ingressClassName }}
            - --upstream=http://{{ include "vibe-kanban-team.frontend.fullname" . }}:{{ .Values.frontend.app.port }}/
            {{- else }}
            - --upstream=static://200
            {{- end }}
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            - --set-xauthrequest=true
            - --set-authorization-header=true
            - --cookie-domain={{ .Values.frontend.auth.cookieDomain | default (include "vibe-kanban-team.frontend.cookieDomain" .) }}
            - --cookie-samesite=lax
            - --cookie-secure=true
            - --whitelist-domain={{ .Values.frontend.auth.cookieDomain | default (include "vibe-kanban-team.frontend.cookieDomain" .) }}
            - --redirect-url=https://{{ .Values.frontend.auth.host | default (include "vibe-kanban-team.auth.host" .) }}/oauth2/callback
            - --skip-provider-button=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.frontend.auth.secretName }}
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.frontend.auth.secretName }}
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.frontend.auth.secretName }}
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.auth.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          {{- if gt (len .Values.frontend.auth.allowedEmails) 0 }}
          volumeMounts:
            - name: emails
              mountPath: /etc/oauth2-proxy
              readOnly: true
          {{- end }}
      {{- if gt (len .Values.frontend.auth.allowedEmails) 0 }}
      volumes:
        - name: emails
          configMap:
            name: {{ include "vibe-kanban-team.frontend.fullname" . }}-oauth2-proxy-emails
      {{- end }}
{{- end }}
