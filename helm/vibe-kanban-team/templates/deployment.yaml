apiVersion: apps/v1
kind: Deployment
{{- $serverPublicBaseUrlSet := false -}}
{{- range .Values.env }}
{{- if eq .name "SERVER_PUBLIC_BASE_URL" }}
{{- $serverPublicBaseUrlSet = true -}}
{{- end }}
{{- end }}
metadata:
  name: {{ include "vibe-kanban-team.fullname" . }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vibe-kanban-team.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vibe-kanban-team.labels" . | nindent 8 }}
        app.kubernetes.io/component: app
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vibe-kanban-team.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            {{- if .Values.electric.enabled }}
            - name: ELECTRIC_URL
              value: "http://{{ include "vibe-kanban-team.electric.fullname" . }}:{{ .Values.electric.service.port }}"
            {{- end }}
            {{- if and (include "vibe-kanban-team.remote.publicBaseUrl" .) (not $serverPublicBaseUrlSet) }}
            - name: SERVER_PUBLIC_BASE_URL
              value: {{ include "vibe-kanban-team.remote.publicBaseUrl" . | quote }}
            {{- end }}
            {{- if .Values.config.allowedEmailDomains }}
            - name: ALLOWED_EMAIL_DOMAINS
              value: {{ .Values.config.allowedEmailDomains | quote }}
            {{- end }}
            {{- include "vibe-kanban-team.remote.structuredEnv" . | nindent 12 }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
