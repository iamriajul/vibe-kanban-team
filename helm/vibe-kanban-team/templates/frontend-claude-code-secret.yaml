{{- if .Values.frontend.enabled }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace "vibe-kanban-claude-code") }}
{{- if or (not $existing) (ne (default "" .Values.frontend.claudeCode.oauthToken) "") }}
# Claude Code OAuth token secret.
# Only created if it doesn't already exist, OR if a token is explicitly provided.
# Edit via Lens to update the token, then restart the frontend deployment.
apiVersion: v1
kind: Secret
metadata:
  name: vibe-kanban-claude-code
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  oauth-token: {{ .Values.frontend.claudeCode.oauthToken | default "" | quote }}
{{- end }}
{{- end }}
