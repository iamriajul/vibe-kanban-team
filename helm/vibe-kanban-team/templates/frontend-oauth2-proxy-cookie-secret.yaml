{{- if and .Values.frontend.enabled .Values.frontend.auth.enabled }}
{{- $secretName := include "vibe-kanban-team.oauth2ProxyCookieSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $cookieSecret := "" }}
{{- if and $existing (index $existing.data "cookie-secret") }}
{{- $cookieSecret = index $existing.data "cookie-secret" | b64dec }}
{{- else }}
{{- $cookieSecret = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  cookie-secret: {{ $cookieSecret | quote }}
{{- end }}
