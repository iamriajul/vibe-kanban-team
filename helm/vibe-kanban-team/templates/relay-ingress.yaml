{{- if and .Values.relay.enabled .Values.relay.ingress.enabled -}}
{{- $relayName := include "vibe-kanban-team.relay.fullname" . -}}
{{- $relaySvcPort := .Values.relay.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $relayName }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: relay
  {{- with .Values.relay.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.relay.ingress.className }}
  ingressClassName: {{ .Values.relay.ingress.className }}
  {{- end }}
  {{- if .Values.relay.ingress.tls }}
  tls:
    {{- range .Values.relay.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.relay.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $relayName }}
                port:
                  number: {{ $relaySvcPort }}
          {{- end }}
    {{- end }}
{{- end }}
