{{- if include "vibe-kanban-team.relay.ingressEnabled" . -}}
{{- $relayName := include "vibe-kanban-team.relay.fullname" . -}}
{{- $relaySvcPort := .Values.relay.service.port -}}
{{- $annotations := include "vibe-kanban-team.ingress.annotations" (dict "root" . "annotations" .Values.relay.ingress.annotations) -}}
{{- $className := include "vibe-kanban-team.ingress.className" (dict "root" . "className" .Values.relay.ingress.className) -}}
{{- $derivedHost := include "vibe-kanban-team.relay.host" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $relayName }}
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: relay
  {{- if ne (trim $annotations) "" }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if or .Values.relay.ingress.tls (and .Values.global.tls.enabled $derivedHost) }}
  tls:
    {{- if .Values.relay.ingress.tls }}
    {{- range .Values.relay.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
      {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
    {{- else }}
    - hosts:
        - {{ $derivedHost | quote }}
        - {{ printf "*.%s" $derivedHost | quote }}
      secretName: {{ printf "%srelay-tls" (.Values.global.tls.secretNamePrefix | default "") }}
    {{- end }}
  {{- end }}
  rules:
    {{- if and .Values.relay.ingress.enabled .Values.relay.ingress.hosts }}
    {{- range .Values.relay.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $relayName }}
                port:
                  number: {{ $relaySvcPort }}
          {{- end }}
    {{- end }}
    {{- else if $derivedHost }}
    - host: {{ $derivedHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $relayName }}
                port:
                  number: {{ $relaySvcPort }}
    - host: {{ printf "*.%s" $derivedHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $relayName }}
                port:
                  number: {{ $relaySvcPort }}
    {{- end }}
{{- end }}
