name: vibe-kanban-team

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      remote-server:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
    volumes:
      - ./standalone/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  remote-db:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    command: ["postgres", "-c", "wal_level=logical"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: remote
      POSTGRES_USER: remote
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - remote-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remote -d remote"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  remote-server:
    image: ${REMOTE_IMAGE:-ghcr.io/iamriajul/vibe-kanban-team-remote}:${VKT_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      remote-db:
        condition: service_healthy
    environment:
      RUST_LOG: ${RUST_LOG:-info,remote=info}
      SERVER_LISTEN_ADDR: 0.0.0.0:8081
      SERVER_PUBLIC_BASE_URL: ${SERVER_PUBLIC_BASE_URL:?Set SERVER_PUBLIC_BASE_URL in .env}
      SERVER_DATABASE_URL: postgresql://remote:${DB_PASSWORD:?Set DB_PASSWORD in .env}@remote-db:5432/remote
      ELECTRIC_URL: http://electric:3000
      ELECTRIC_ROLE_PASSWORD: ${ELECTRIC_ROLE_PASSWORD:?Set ELECTRIC_ROLE_PASSWORD in .env}
      ELECTRIC_PUBLICATION_NAMES: ${ELECTRIC_PUBLICATION_NAMES:-}
      VIBEKANBAN_REMOTE_JWT_SECRET: ${VIBEKANBAN_REMOTE_JWT_SECRET:?Set VIBEKANBAN_REMOTE_JWT_SECRET in .env}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      ZOHO_OAUTH_CLIENT_ID: ${ZOHO_OAUTH_CLIENT_ID:-}
      ZOHO_OAUTH_CLIENT_SECRET: ${ZOHO_OAUTH_CLIENT_SECRET:-}
      ZOHO_ACCOUNTS_URL: ${ZOHO_ACCOUNTS_URL:-}
      SELF_HOST_LOCAL_AUTH_EMAIL: ${SELF_HOST_LOCAL_AUTH_EMAIL:-}
      SELF_HOST_LOCAL_AUTH_PASSWORD: ${SELF_HOST_LOCAL_AUTH_PASSWORD:-}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
      LOOPS_EMAIL_API_KEY: ${LOOPS_EMAIL_API_KEY:-}
      LOOPS_INVITE_TEMPLATE_ID: ${LOOPS_INVITE_TEMPLATE_ID:-}
      LOOPS_REVIEW_READY_TEMPLATE_ID: ${LOOPS_REVIEW_READY_TEMPLATE_ID:-}
      LOOPS_REVIEW_FAILED_TEMPLATE_ID: ${LOOPS_REVIEW_FAILED_TEMPLATE_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_REVIEW_ENDPOINT: ${R2_REVIEW_ENDPOINT:-}
      R2_REVIEW_BUCKET: ${R2_REVIEW_BUCKET:-}
      R2_PRESIGN_EXPIRY_SECS: ${R2_PRESIGN_EXPIRY_SECS:-3600}
      REVIEW_WORKER_BASE_URL: ${REVIEW_WORKER_BASE_URL:-}
      REVIEW_DISABLED: ${REVIEW_DISABLED:-false}
      DIGEST_ENABLED: ${DIGEST_ENABLED:-false}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  electric:
    image: ${ELECTRIC_IMAGE:-electricsql/electric}:${ELECTRIC_TAG:-1.3.3}
    restart: unless-stopped
    depends_on:
      remote-db:
        condition: service_healthy
      remote-server:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://electric_sync:${ELECTRIC_ROLE_PASSWORD:?Set ELECTRIC_ROLE_PASSWORD in .env}@remote-db:5432/remote?sslmode=disable
      PG_PROXY_PORT: "65432"
      LOGICAL_PUBLISHER_HOST: electric
      AUTH_MODE: insecure
      ELECTRIC_INSECURE: "true"
      ELECTRIC_MANUAL_TABLE_PUBLISHING: "true"
      ELECTRIC_USAGE_REPORTING: "false"
      ELECTRIC_FEATURE_FLAGS: allow_subqueries,tagged_subqueries
    volumes:
      - electric-data:/app/persistent

  relay-server:
    profiles: ["relay"]
    image: ${RELAY_IMAGE:-ghcr.io/iamriajul/vibe-kanban-team-relay}:${VKT_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      remote-db:
        condition: service_healthy
      remote-server:
        condition: service_healthy
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      SERVER_DATABASE_URL: postgresql://remote:${DB_PASSWORD:?Set DB_PASSWORD in .env}@remote-db:5432/remote
      RELAY_LISTEN_ADDR: 0.0.0.0:8082
      VIBEKANBAN_REMOTE_JWT_SECRET: ${VIBEKANBAN_REMOTE_JWT_SECRET:?Set VIBEKANBAN_REMOTE_JWT_SECRET in .env}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  remote-db-data:
  electric-data:
  caddy-data:
  caddy-config:
